version: '3.9'

services:
  avito-bridge:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: avito-ws-bridge
    restart: unless-stopped
    ports:
      - '${PORT:-3000}:3000'
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true
      - PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium
    # Required for Puppeteer/Chromium inside Docker
    security_opt:
      - seccomp:unconfined
    shm_size: '256mb'
    volumes:
      # Persist Puppeteer user data across restarts (keeps session cookies)
      - puppeteer-data:/home/appuser/.local/share/puppeteer
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

volumes:
  puppeteer-data:
    driver: local
